<!DOCTYPE html>
<html>
    <head>
        <title>IntegrityChecker</title>
        <link href="bootstrap.min.css" rel="stylesheet" >
        <script src="web3.min.js"></script>
        <script src="bootstrap.bundle.min.js"></script>
        <script src="crypto.js"  ></script>
        <script src="ajax.js"  ></script>
        <script src="blockchain.js"  ></script>
        <script type="module" src="index.js"  defer></script>
        <meta charset="utf-8">
    </head>

    <body class="d-flex align-items-center flex-column">
        <header class="d-flex flex-column align-items-center" >
            
            <article>
                <div id="header-left"></div>
                <div id="header-center">
                    <h1>IntegrityChecker</h1>
                </div>
                <div id="header-right">
                </div>
            </article>

            <article>
                <div id="provider"></div>
                <div id="chainId"></div>
                <div id="latestBlock"></div>
                <div id="connectedAccount"></div>
            </article>
        </header>

        <main class="m-5">
            <nav>
                <div class="nav nav-tabs" id="nav-tab" role="tablist">
                    <button class="nav-link active" id="nav-sign-tab" data-bs-toggle="tab" data-bs-target="#nav-sign" type="button" role="tab" aria-controls="nav-home" aria-selected="true">Signer un document</button>
                    <button class="nav-link" id="nav-verify-tab" data-bs-toggle="tab" data-bs-target="#nav-verify" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">Vérifier l'intégrité</button>
                </div>
            </nav>
            <div class="tab-content" id="nav-tabContent">
                <div id="nav-sign" role="tabpanel" aria-labelledby="nav-sign-tab" class="tab-pane fade show active">
                    <h1>Signer un document</h1>
                    <form id="form-sign">
                        <input type="file" id="file-sign-input" class="form-control-file" name="files" />
                        <button type="submit" class="btn btn-primary mb-2" id="file-sign-button" >Signer</button>
                    </form>
                </div>
                <div id="nav-verify" role="tabpanel" aria-labelledby="nav-verify-tab" class="tab-pane fade">
                    <h1>Vérifier l'intégrité d'un document</h1>
                    <form id="form-verify" >
                        <input type="file" id="file-verify-input" class="form-control-file" name="files" />
                        <button type="submit" class="btn btn-primary mb-2" id="file-verify-button">Vérifier</button>
                    </form>
                        <div id="verify-result">
                        </div>
                </div>
            <div/>
        </main>

        <footer>
            <div id="warn" style="color: red"></div>
        </footer>
    </body>
</html>
