<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <title>IntegrityChecker</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <script src="js/web3.min.js"></script>
    <script src="js/pdf-lib.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/ajax.js"></script>
    <script src="js/blockchain.js"></script>
    <script type="module" src="js/index.js" defer></script>
    
    <meta charset="utf-8">
</head>

<body class="d-flex flex-column min-vh-100">

<header class="container-fluid py-3 border-bottom">
    <div class="row align-items-start">

        <div class="col-md-3" id="header-left"></div>


        <div class="col-md-6 text-center" id="header-center">
            <h1>IntegrityChecker</h1>
        </div>

        <div class="col-md-3 d-flex justify-content-end position-fixed end-0 top-0" id="header-right">
            <div class="card p-2 w-100" style="max-width: 350px;">
                <div class="card-body p-2 text-center">

                    <div id="provider"></div>
                    <div id="chainId"></div>
                    <div id="latestBlock"></div>



                    <h6 class="mt-2"><button type="button" class="btn btn-primary-dark" data-bs-toggle="collapse" data-bs-target="#collabse-block-infos" aria-expanded="true" aria-controls="collabse-block-infos" >DERNIER BLOC</button></h6>
                    <div class="collapse show" id="collabse-block-infos">
                        <hr class="my-2">
                        
                        <small>Numéro</small>
                        <div id="latestBlock-number" class="ps-2 bg-dark bg-gradient rounded"></div>

                        <small>Nonce</small>
                        <div id="latestBlock-nonce" class="ps-2 bg-dark bg-gradient rounded"></div>

                        <small>Hash</small>
                        <div id="latestBlock-hash" class="ps-2 bg-dark bg-gradient rounded"></div>

                    </div>
                    <div id="connectedAccount" class="mt-2"></div>
                </div>
            </div>
        </div>

    </div>
</header>

<main class="container flex-grow-1 my-5">

    <ul class="nav nav-tabs justify-content-center" id="nav-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="nav-sign-tab"
                data-bs-toggle="tab" data-bs-target="#nav-sign"
                type="button" role="tab">
                Signer un document
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="nav-verify-tab"
                data-bs-toggle="tab" data-bs-target="#nav-verify"
                type="button" role="tab">
                Vérifier l'intégrité
            </button>
        </li>
    </ul>


    <div class="tab-content mt-4" id="nav-tabContent">
        <div id="nav-sign" class="tab-pane fade show active" role="tabpanel">
            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <div class="card mb-3">
                        <div class="card-header">
                            <h3>Signer un document</h3>
                        </div>
                        <div class="card-body">
                            <form id="form-sign">
                                <div class="mb-3">
                                    <input type="file" id="file-sign-input"
                                        class="form-control"
                                        name="files" required title="Document à signer">
                                </div>
                                <button type="submit"
                                    class="btn btn-primary w-100"
                                    id="file-sign-button">
                                    Signer
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="card d-none">
                        <div class="card-body">
                            <div id="sign-result"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>


        <div id="nav-verify" class="tab-pane fade" role="tabpanel">
            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <div class="card mb-3">
                        <div class="card-header">
                            <h3>Vérifier l'intégrité d'un document</h3>
                        </div>
                        <div class="card-body">
                            <form id="form-verify">
                                <div class="mb-3">
                                    <input type="file" id="file-verify-input"
                                        class="form-control"
                                        name="files" required title="Document à vérifier">
                                </div>
                            
                                <div>
                                    <input type="checkbox" id="i-have-cert" class="form-check-input" type="button" data-bs-toggle="collapse" data-bs-target="#collabse-with-cert" aria-expanded="false" aria-controls="collabse-with-cert" >
                                    <label for="i-have-cert" class="form-check-label" >J'ai un certificat</label>    
                                    
                                    <div class="collapse" id="collabse-with-cert">
                                        <div class="card card-body">
                                            <div class="mb-3">
                                                <input type="file" id="cert-verify-input"
                                                    class="form-control"
                                                    name="cert" 
                                                    title="Certificat au format pdf" accept="application/pdf">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="card d-none">
                        <div class="card-body">
                            <div id="verify-result" ></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</main>

<footer class="text-center py-3 border-top mt-auto">
    
</footer>

</body>
</html>
