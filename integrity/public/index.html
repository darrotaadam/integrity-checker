<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
    <head>
        <title>IntegrityChecker</title>
        <link href="css/bootstrap.min.css" rel="stylesheet" >
        <script src="js/web3.min.js"></script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/crypto.js"  ></script>
        <script src="js/ajax.js"  ></script>
        <script src="js/blockchain.js"  ></script>
        <script type="module" src="js/index.js"  defer></script>
        <meta charset="utf-8">
    </head>

    <body class="d-flex align-items-center flex-column"  >
        <header class="d-flex flex-row align-items-center" >
            
            <article>
                <div id="header-left"></div>
                <div id="header-center">
                    <h1>IntegrityChecker</h1>
                </div>
                <div id="header-right">
                </div>
            </article>

            <article class="card p-2 m-2">
            <div class="card-body">
                <div id="provider"></div>
                <div id="chainId"></div>
                <div id="latestBlock"></div>
                    <h4>Bloc le plus récent</h4><br/>
                    <h5>Numéro</h5><div id="latestBlock-number"></div><hr/>
                    <h5>Nonce</h5><div id="latestBlock-nonce"></div><hr/>
                    <h5>Hash</h5><div id="latestBlock-hash"></div><hr/>
                <div id="connectedAccount"></div>
            </div>
            </article>
        </header>

        <main class="m-5 w-100 d-flex flex-column align-items-center">
            <nav>
                <div class="nav nav-tabs" id="nav-tab" role="tablist">
                    <button class="nav-link active" id="nav-sign-tab" data-bs-toggle="tab" data-bs-target="#nav-sign" type="button" role="tab" aria-controls="nav-home" aria-selected="true">Signer un document</button>
                    <button class="nav-link" id="nav-verify-tab" data-bs-toggle="tab" data-bs-target="#nav-verify" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">Vérifier l'intégrité</button>
                </div>
            </nav>
            <div class="tab-content" id="nav-tabContent">
                <div id="nav-sign" role="tabpanel" aria-labelledby="nav-sign-tab" class="tab-pane fade show active w-100 p-3">
                    <div class="card">
                        <div class="card-header">
                            <h1>Signer un document</h1>
                        </div>
                        
                        <div class="card-body">
                            <form id="form-sign">
                                <div class="mb-3">
                                    <input type="file" id="file-sign-input" class="form-control" name="files" required lang="fr" title="Fichier à signer"/>
                                </div>
                                <button type="submit" class="btn btn-primary mb-2" id="file-sign-button" >Signer</button>
                            </form>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <div id="sign-result"></div>
                        </div>
                    </div>
                </div>
                <div id="nav-verify" role="tabpanel" aria-labelledby="nav-verify-tab" class="tab-pane fade w-100 p-3">
                    <div class="card">
                        <div class="card-header">
                            <h1>Vérifier l'intégrité d'un document</h1>
                        </div>
                        <div class="card-body">
                            <form id="form-verify" >
                                <div class="mb-3">
                                    <input type="file" id="file-verify-input" class="form-control" name="files" required lang="fr" title="Fichier à vérifier" />
                                </div>
                            </form>
                        </div>
                    </div>
                    <div id="verify-result"></div>
                </div>
            <div/>
        </main>

        <footer>
            <div id="warn" style="color: red"></div>
        </footer>
    </body>
</html>
